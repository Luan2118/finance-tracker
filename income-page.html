<!DOCTYPE html>
<html>
  <head>
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="css-style/income-page/income.css">
    <link rel="stylesheet" href="css-style/shared/general.css">
    <link rel="stylesheet" href="css-style/shared/heather.css">
    <link rel="stylesheet" href="css-style/shared/sidebar.css">
  </head>

  <body>
    <div class="heather">
      <div class="title">Expense Tracker</div>
    </div>

    <div class="sidebar">
      <div class="profile-link">
        <div><img class="profile-picture" src="icons/profile-picture.jpg"></div>
        <div class="profile-name">Luan Le</div>
      </div>

      <a href="main-page.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/dashboard-icon.png"></div>
          <div class="side-bar-text">Dashboard</div>
        </div>
      </a>

      <a href="income-page.html">
      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/sidebar-income-icon.png"></div>
        <div class="side-bar-text">
          Income</div>
      </div>
      </a>
      
      <a href="expense-page.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/sidebar-expense-icon.png"></div>
          <div class="side-bar-text">Expense</div>
        </div>
      </a>

      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/logout-icon.jpg"></div>
        <div class="side-bar-text">Logout</div>
      </div>
    </div>

    <div class="main-income-grid">
      <div class="horní-část">
  
        <div class="income-overview-grid">
          <div class="income-overview-text">Income Overview</div>
          <div>
            <button onclick=showPopUpDialog(true)  class="add-income-button ">&#43; Add Income</button>
          </div>
        </div>

        <dialog id="add-income-dialog" >
            <form class="add-income-form">
            <div class="add-income-heather">
              <div class="add-income-heather-title">Add Income</div>
              <button onclick=showPopUpDialog(false)  class="add-income-popup-close-button" type="button">&times;</button>
              
            </div>
            <hr>
            
            <div class="input-grid">

            
            <div class="add-income-inputs">
              <div>Income Source</div>
              <input class="add-income-input-element" type="text">
            </div>

            <div class="add-income-inputs">
              <div>Amount</div>
              <input class="add-income-input-element" type="number">
            </div>

            <div class="add-income-inputs">
              <div>Date</div>
              <input class="add-income-input-element" type="date">
            </div>

            <div class="right-align">
              <button class="add-income-button-submit">Add Income</button>
            </div>

            </div>

            </form>
        </dialog>


        <div>
          <img class="income-bar-chart-img" src="icons/income-bar-chart.png">
        </div>

      </div>

      <div class="dolní-část">
        <div class="income-grid">

        <div class="income-sources-grid">
          <div class="income-title">Income Sources</div>
          <div><button class="see-all-button">Download <span class="see-all-arrow">&#8594;</span></button></div>
        </div>
  
        <div class="income-info-grid">
          
          <div class="each-income-grid">
            <div class="each-income">
              <div class="income-info-inner-grid">
              <div class="income-img-grid"><img class="income-img" src="icons/shopping-icon.png"></div>
              <div class="income-info">
                <div>
                  <div>Salary</div>
                  <div class="income-date">9.5.2025</div>
                </div>
                
                <div class="income-amount-plus">+35000Kč</div>
              </div>
              </div>
            </div>
          
            <div class="each-income">
              <div class="income-info-inner-grid">
                <div class="income-img-grid"><img class="income-img" src="icons/salary-icon.png"></div>
                <div class="income-info">
                  <div>
                    <div>Veru's Job</div>
                    <div class="income-date">10.5.2025</div>
                  </div>
                  
                  <div class="income-amount-plus">+9000Kč</div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="each-income-grid">
            <div>
              <div class="income-info-inner-grid">
                <div class="income-img-grid"><img class="income-img" src="icons/utility-bills-icon.png"></div>
                <div class="income-info">
                  <div>
                    <div>Overtime</div>
                    <div class="income-date">6.5.2025</div>
                  </div>
                  
                  <div class="income-amount-plus">+1500Kč</div>
                </div>
              </div>
            </div>

            <div>
              <div class="income-info-inner-grid">
                <div class="income-img-grid"><img class="income-img" src="icons/utility-bills-icon.png"></div>
                <div class="income-info">
                  <div>
                    <div>Job 2</div>
                    <div class="income-date">6.5.2025</div>
                  </div>
                  
                  <div class="income-amount-plus">+3000Kč</div>
                </div>
              </div>
            </div>
          </div>
      
        </div>

      </div>

    </div>

    <script src="script/income.js"></script>
  </body>
</html>
