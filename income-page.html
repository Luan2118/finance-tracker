    <div class="main-income-grid">
      <div class="top-part">
  
        <div class="income-overview-grid">
          <div class="income-overview-text">Income Overview</div>
          <div>
            <button   class="add-income-button js-add-income-button">&#43; Add Income</button>
          </div>
        </div>

        <dialog id="add-income-dialog" >
            <form class="add-income-form">
            <div class="add-income-heather">
              <div class="add-income-heather-title">Add Income</div>
              <button   class="add-income-popup-close-button js-add-income-popup-close" type="button">&times;</button>
              
            </div>
            <hr>
            
            <div class="input-grid">

            
            <div class="add-income-inputs">
              <div>Income Source</div>
              <input class="add-income-input-element js-income-value" type="text" name="incomeValue">
            </div>

            <div class="add-income-inputs">
              <div>Amount</div>
              <input class="add-income-input-element js-amount-value " type="number" min="0" step="1"  oninput="this.value = this.value.replace(/[^0-9]/g,'')">
            </div>

            <div class="add-income-inputs">
              <div>Date</div>
              <input class="add-income-input-element js-date-value" type="date">
            </div>

            <div class="right-align">
              <button class="add-income-button-submit js-add-income-button-submit" type="button">Add Income</button>
            </div>

            </div>

            </form>
        </dialog>

        <div class="income-chart-grid">
          <canvas id="income-chart"></canvas>
          <input id="chart-filter" type="month">
          <button id="chart-reset-button">Reset</button>
        </div>

      </div>

      <div class="bottom-part">
        <div class="income-grid">

        <div class="income-sources-grid">
          <div class="income-title">Income Sources</div>
          <div><button class="see-all-button">Download <span class="see-all-arrow">&#8594;</span></button></div>
        </div>
