<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css-style/register-page/general.css">
  <link rel="stylesheet" href="./css-style/register-page/register.css">
  <title>Document</title>
</head>

<body>  
    <div class="main-grid">

      <div class="register-grid">
        <div class="create-text">Create an account</div>
        <div class="catchy-text">Start managing your money smarter — track expenses, grow savings, and stay in control.</div>

        <div class="register-link">
          <div class="register-text">Username</div>
          <input class="register-input" type="text" placeholder="Enter your username">
        </div>

        <div class="register-link">
          <div class="register-text">Email</div>
          <input class="register-input" type="text" placeholder="Enter your email">
        </div>

        <div class="register-link">
          <div class="register-text">Password</div>
          <input class="register-input" type="password" placeholder="Enter your password">
        </div>

        <div class="register-link">
          <div class="register-text">Confirm password</div>
          <input class="register-input" type="password" placeholder="Confirm your password">
        </div>

        <div class="register-button-grid"><button class="register-button">Register</button></div>
      </div>

    </div>

    <script src="./script/register.js">
      
    </script>
</body>
</html>
