<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="./css-style/login-register-page/general.css">
    <link rel="stylesheet" href="./css-style/login-register-page/login.css">
  </head>
  <body>
    <div class="main-grid">
      
      <div class="main-inner-grid">
        
        <div class="left-grid">
          <div class="title-grid"> <div class="title">Finance Tracker</div></div>

          <div class="login">
            <div class="login-text">Login</div>

              <div class="login-link">
                <div class="email-text">E-mail</div>
                <input class="login-input" type="text" placeholder="Email">
              </div>

            <div class="login-link">
              <div class="password-text">Password</div>
              <input class="login-input" type="password" placeholder="Password">
            </div>

            <div class="remember-forgot-grid">
              <div class="remember-me-grid">
                <input type="checkbox">
                <div>Remember me</div>
              </div>

              <div>
                <a href="">Forgot password</a>
              </div>
            </div>


            <div class="login-link">
              <div class="login-button-grid"><button class="login-button">Login</button></div>
            </div>

            <div class="register-link-grid">
              <div>Don't have an account?</div>
              <div class="register-link"><a href="register.html">Register</a></div>
            </div>
          </div>
        </div>
        
        <div class="right-grid">
          <img class="login-register-img" src="./icons/login-register-page.png">
        </div>


      </div>


    </div>
  </body>
</html>
