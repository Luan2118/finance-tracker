<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="./css-style/login-page/general.css">
    <link rel="stylesheet" href="./css-style/login-page/login.css">

  </head>
  <body>
    <main class="main-grid">
      <h1 class="sr-only">Login page</h1>
        <form class="login-grid">

          <header>
            <h2 class="welcome-text">Welcome back!</h2>
            <p class="catchy-text">Your journey to smarter financial habits starts here.</p>
          </header>
  
          
          <div class="login-link">
            <label for="email" class="email-text">E-mail</label>
            <input id="email" class="login-input login-input-js" type="email" placeholder="Enter your e-mail" name="email" required>
          </div>

          <div class="login-link">
            <label for="password" class="password-text">Password</label>
            <input id="password" class="login-input password-input-js" type="password" placeholder="Enter your password" name="password" required>

          </div>

          <div class="remember-forgot-grid">
            <div>
              <input id="remember-me" type="checkbox" name="remeber-password">
              <label for="remember-me">Remember me</label>
            </div>
            <a href="">Forgot password</a>
          </div> 


          <div class="login-link">
            <button class="login-button login-button-js" type="submit">Login</button>
            <div class="login-validation"></div>
          </div>

          <div class="register-link-grid">
            <div>Don't have an account?</div>
            <a class="register-link" href="register.html">Register</a>
          </div>

        </form>
        
    </main>

    <script type="module" src="script/login.js"></script>
  </body>
</html>
