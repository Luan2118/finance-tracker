<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css-style/login-page/general.css">
    <link rel="stylesheet" href="./css-style/login-page/login.css">
  </head>
  <body>
    <div class="main-grid">

        <div class="login-grid">

          <div class="login">
            <div class="welcome-text">Welcome back!</div>
            <div class="catchy-text">Your journey to smarter financial habits starts here.</div>
            <div></div>
            
              <div class="login-link">
                <div class="email-text">E-mail</div>
                <input class="login-input login-input-js" type="text" placeholder="Enter your e-mail">
                <div class="email-input-validation"></div>
              </div>

            <div class="login-link">
              <div class="password-text">Password</div>
              <input class="login-input password-input-js" type="password" placeholder="Enter your password">
              <div class="password-input-validation"></div>
            </div>

            <div class="remember-forgot-grid">
              <div class="remember-me-grid">
                <input type="checkbox">
                <div>Remember me</div>
              </div>

              <div>
                <a href="">Forgot password</a>
              </div>
            </div>


            <div class="login-link">
              <div class="login-button-grid"><button class="login-button login-button-js">Login</button></div>
              <div class="login-validation"></div>
            </div>

            <div class="register-link-grid">
              <div>Don't have an account?</div>
              <div class="register-link"><a href="register.html">Register</a></div>
            </div>
          </div>
        </div>

    </div>

    <script src="script/login.js"></script>
  </body>
</html>
