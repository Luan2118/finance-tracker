<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="css-style/expense-page/expense.css">
    <link rel="stylesheet" href="css-style/shared/general.css">
    <link rel="stylesheet" href="css-style/shared/sharedHeader.css">
    <link rel="stylesheet" href="css-style/shared/sidebar.css">
  </head>

  <body>

    <a class="skip-link" href="#main">Skip to content</a>

     <header class="header">
      <button type="button" id="menu-icon-box" class="menu-icon-btn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar"><img class="menu-icon js-menu-icon" src="icons/menu-icon.png" alt=""></button>
      <a class="title" href="index.html">Finance Tracker</a>
    </header>



    
    <div class="layout">

      <aside id="sidebar" class="sidebar" role="navigation">
        <div class="profile-link">
          <div class="profile-picture-wrapper"><img class="profile-picture" src="icons/profile-picture.jpg" alt="Profile picture"></div>
          <div class="profile-name profile-name-js"></div>
        </div>

        <nav aria-label="Primary">
          <ul>
            <li>
              <a href="index.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/dashboard-icon.png" alt=""></div>
                  <div class="dashboard-button side-bar-text">Dashboard</div>
                </div>
              </a>
            </li>

            <li>
              <a href="income-page.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-income-icon.png" alt=""></div>
                  <div class="income-button side-bar-text">Income</div>
                </div>
              </a>
            </li>

            <li>
              <a href="expense-page.html" aria-current="page">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-expense-icon.png" alt=""></div>
                  <div class="expense-button side-bar-text">Expense</div>
                </div>
              </a>
            </li>
          </ul>
        </nav>


        <button type="button" class="side-bar-link logout-button logout-button-js">
          <span class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/logout-icon.jpg" alt=""></span>
          <span class="side-bar-text">Logout</span>
        </button>
      </aside>

      <main id="main" class="main-expense-grid" tabindex="-1">
        <h1 class="sr-only">Expense page</h1>

        <section class="top-part">

          <header class="expense-overview-grid">
            <h2 class="expense-overview-text">Expense Overview</h2>
            <button class="add-expense-button js-add-expense-button" type="button" aria-controls="add-expense-dialog" aria-haspopup="dialog">&#43; Add Expense</button>
          </header>

          <dialog id="add-expense-dialog" class="js-add-expense-dialog" aria-labelledby="add-expense-title" aria-modal="true">

            <form class="add-expense-form js-add-expense-form">
              <div class="add-expense-header">
                <h2 id="add-expense-title" class="add-expense-header-title">Add Expense</h2>
                <button class="add-expense-popup-close-button js-add-expense-popup-close" type="button" aria-label="Close">&times;</button>
              </div>
              <hr>
              
              <div class="input-grid">
                <div class="emoji-picker-grid">

                  <div class="emoji-picker-inner-grid">
                    <button type="button" class="emoji-picker-btn" aria-label="Emoji picker" aria-controls="emoji-picker-element" aria-expanded="false"><img class="emoji-picker js-emoji-picker" src="icons/emoji-picker.png" alt=""></button>
                    
                    <div id="emoji-picker-element" class="js-emoji-picker-element"></div>
                    <label for="emoji-input" class="pick-icon">Pick Icon</label>
                    <input maxlength="2" id="emoji-input" class=" emoji-picked js-emoji-picked" name="emoji" tabindex="-1" autocomplete="off">
                  </div>

                  <label class="expense-category"> 
                    Category:
                    <select   name="category" class="category-input" aria-describedby="category-error" >
                      <option value="" selected disabled>Select a category</option>
                      <option value="Food & Groceries">Food & Groceries</option>
                      <option value="Dining Out / Takeout">Dining Out / Takeout</option>
                      <option value="Shopping">Shopping</option>
                      <option value="Transportation">Transportation</option>
                      <option value="Health">Health</option>
                      <option value="Entertainment">Entertainment</option>
                      <option value="Travel">Travel</option>
                      <option value="Education">Education</option>
                      <option value="Housing">Housing</option>
                      <option value="Other-Expense">Other-Expense</option>
                    </select>
                  </label>
                </div>

                <div id="category-error" class="category-input-alert js-category-input-alert"></div>

              
                <div class="add-expense-inputs">
                  <label for="expense-source-input">Expense Source</label>
                  <input id="expense-source-input" class="add-expense-input-element js-expense-value" type="text" name="expenseSourceValue" aria-describedby="expense-source-error" >
                  <div id="expense-source-error" class="expense-source-input-alert js-expense-source-input-alert"></div>
                </div>

                <div class="add-expense-inputs">
                  <label for="expense-amount-input">Amount</label>
                  <input id="expense-amount-input" class="add-expense-input-element js-amount-value " type="number" min="0" step="1" name="amountValue" oninput="this.value = this.value.replace(/[^0-9]/g,'')" aria-describedby="expense-amount-error" >
                  <div id="expense-amount-error" class="expense-amount-input-alert js-expense-amount-input-alert"></div>
                </div>

                <div class="add-expense-inputs">
                  <label for="date-input">Date</label>
                  <input id="date-input" class="add-expense-input-element js-date-value" type="date" name="dateValue" aria-describedby="date-input-error">
                  <div id="date-input-error" class="expense-date-input-alert js-expense-date-input-alert"></div>
                </div>

                <div class="right-align">
                  <button class="add-expense-button-submit js-add-expense-button-submit" type="submit">Add Expense</button>
                </div>

              </div>

            </form>
          </dialog>

          <section class="expense-chart-grid" aria-label="Expense overview">
            <div class="expense-chart-wrap">
              <div class="expense-chart-wrap-inner">
                <canvas id="expense-chart" role="img" aria-label="Expense chart overview"></canvas>
              </div>
            </div>
            <label for="chart-filter" class="sr-only">Chart months filter</label>
            <input class="expense-chart-filter-input" id="chart-filter" type="month">
            <button class="reset-filter-button" id="chart-reset-button" type="button">Reset</button>
          </section>

        </section>

        <section class="bottom-part">

          <header class="expense-sources-grid">
            <h2 class="expense-title">All Expenses</h2>
            <a href="see-all-expenses.html" class="see-all-button">See All Expenses</a>
          </header>
    

          <ol class="each-expense-grid js-each-expense-grid"></ol>

        </section> 

      </main>
    </div>


    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <script type="module">
      import textFieldEdit from 'https://cdn.jsdelivr.net/npm/text-field-edit@^4/index.js';
      window.textFieldEdit = textFieldEdit;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script type="module" src="script/expense-page/expense.js"></script>
    <script type="module" src="script/chartJS/expense-page/expense-page-chart.js"></script>

  </body>
</html>
