
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>See all Income</title>
    <link rel="stylesheet" href="./css-style/shared/general.css">
    <link rel="stylesheet" href="./css-style/income-page/see-all-income.css">
    <link rel="stylesheet" href="./css-style/shared/sharedHeader.css">
    <link rel="stylesheet" href="./css-style/shared/sidebar.css">
  </head>

  <body>
    <div  class="header">
      <div id="menu-icon-box"><img class="menu-icon js-menu-icon" src="icons/menu-icon.png"></div>
      <div class="title"><a href="index.html">Finance Tracker</a></div>
    </div>

    


    <div class="main-grid-see-all">

      <div class="left-side">
        <div id="sidebar" class="sidebar">
      <div class="profile-link">
        <div><img class="profile-picture" src="icons/profile-picture.jpg"></div>
        <div class="profile-name profile-name-js"></div>
      </div>

      <a href="index.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/dashboard-icon.png"></div>
          <div class="side-bar-text"><button class="dashboard-button">Dashboard</button></div>
        </div>
      </a>

      <a href="income-page.html">
      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/sidebar-income-icon.png"></div>
        <div class="side-bar-text">
          <button class="income-button">Income</button></div>
      </div>
      </a>
      
      <a href="expense-page.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/sidebar-expense-icon.png"></div>
          <div class="side-bar-text"><button class="expense-button">Expense</button></div>
        </div>
      </a>

      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/logout-icon.jpg"></div>
        <div class="side-bar-text logout-button-js"><button class="logout-button">Logout</button></div>
      </div>
    </div>
      </div>

      <div class="right-side">
        <div class="see-all-title">
          See All Income
        </div>
        
        <div class="top-part">
          <div class="filter-text">
            Filter:
          </div>
          <div class="filter-grid">
              <div class="category-grid">
                <div class="category-text">Category</div>
                <label class="label">
                  <select class="income-category" name="category">
                    <option value="" selected disabled>Select a category</option>
                    <option value="Salary">Salary</option>
                    <option value="Part-Time">Part-Time</option>
                    <option value="Overtime">Overtime</option>
                    <option value="Interest">Interest</option>
                    <option value="Other-Income">Other-Income</option>
                    <option value="see-all">See all</option>
                  </select>
                </label>
  
              </div>
              <div class="category-validation category-validation-js"></div>
  
              <div class="timeline-grid">
                <div class="timeline-text">Timeline</div>
  
                <div class="timeline-inner-grid"> 
                  <div><button class="filter-button-timeline-custom filter-button-timeline-custom-js"  value="custom">Custom</button>
                  </div>
                  <div class="time-from" id="time-from"></div>
                  <div class="time-to" id="time-to"></div>
  
                  
                  <div><button class="filter-button-timeline"  value="7">Last 7 days</button></div>
                  
                  <div><button class="filter-button-timeline"  value="30">Last 30 days</button></div>
                  
                  <div><button class="filter-button-timeline"  value="60">Last 60 days</button></div>
                  
                  <div><button class="filter-button-timeline" value="see-all">See all</button></div>
                </div>
              </div>
  
              <div class="amount-grid">
  
                <div class="income-range-text">Income range</div>
  
                <div class="amount-inner-grid">
                  <div><button class="filter-button-amount-custom filter-button-amount-custom-js" value="custom">Custom</button></div>
                  <div class="min-amount" id="min-amount"></div>
                  <div class="max-amount" id="max-amount"></div>
                  
                  <div><button class="filter-button-amount filter-button-amount-first" value="5000">up to 5000Kč</button></div>
                  
                  <div><button class="filter-button-amount filter-button-amount-second" value="10000">up to 10000Kč</button></div>
                  
                  <div><button class="filter-button-amount filter-button-amount-third" value=" 20000">up to 20000kč</button></div>
  
                  <div><button class="filter-button-amount" value="see-all">See all</button></div>
                </div>
  
              </div>
              
              <div class="filter-submit-button-box"><button class="filter-submit-button filter-submit-button-js">Filter</button></div>
          </div>
  
  
        </div>
  
        <div class="bottom-part">
            <div class="income-grid">
  
              <div>
                <div class="income-inner-title">Income Overview</div>
                
              </div>
        
              <div class="income-info-grid js-income-info-grid">
  
              </div>
              <div class="income-validation"></div>
            </div>
        
            <div class="income-chart-grid">
              <div class="income-overview-text">Income Overview Chart</div>
              <div class="income-overview-chart-grid"><canvas id="income-chart"></canvas></div>
            </div>
      </div>

    </div>


    <script type="module" src="./script/income-page/see-all-income.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  </body>
</html>
