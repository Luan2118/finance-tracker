
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>See all Income</title>
    <link rel="stylesheet" href="./css-style/shared/general.css">
    <link rel="stylesheet" href="./css-style/income-page/see-all-income.css">
    <link rel="stylesheet" href="./css-style/shared/sharedHeader.css">
    <link rel="stylesheet" href="./css-style/shared/sidebar.css">
  </head>

  <body>

    <a class="skip-link" href="#main">Skip to content</a>

    <header  class="header">
      <button type="button" id="menu-icon-box" class="menu-icon-btn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
        <img class="menu-icon js-menu-icon" src="icons/menu-icon.png" alt="">
      </button>
      <div class="title"><a href="index.html">Finance Tracker</a></div>
    </header>

    


    <div class="layout">

      <div id="sidebar" class="sidebar">
        
        <div class="profile-link">
          <div class="profile-picture-wrapper"><img class="profile-picture" src="icons/profile-picture.jpg" alt="Profile photo"></div>
          <div class="profile-name profile-name-js"></div>
        </div>

        <nav aria-label="Primary">
          <ul>
            <li>
              <a href="index.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/dashboard-icon.png" alt=""></div>
                  <div class="side-bar-text">Dashboard</div>
                </div>
              </a>
            </li>
            
            <li>
              <a href="income-page.html">
              <div class="side-bar-link">
                <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-income-icon.png" alt=""></div>
                <div class="side-bar-text">Income</div>
              </div>
              </a>
            </li>
            
            <li>
              <a href="expense-page.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-expense-icon.png" alt=""></div>
                  <div class="side-bar-text">Expense</div>
                </div>
              </a>
            </li>
          </ul>
        </nav>

        <button aria-label="Logout" type="button" class="side-bar-link logout-button logout-button-js">
          <span class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/logout-icon.jpg" alt=""></span>
          <span class="side-bar-text  ">Logout</span>
        </button>
      </div>


      <main id="main" class="main-content" tabindex="-1">
        <h1 class="see-all-title">
          See All Income
        </h1>
        
        <div class="top-part">
          <div class="filter-text">
            Filter:
          </div>
          <div class="filter-grid">
              <div class="category-grid">

                <label for="category" class="label category-text">Category</label>
                  <select id="category" class="income-category" name="category" aria-describedby="category-select">
                    <option value="" selected disabled>Select a category</option>
                    <option value="Salary">Salary</option>
                    <option value="Part-Time">Part-Time</option>
                    <option value="Overtime">Overtime</option>
                    <option value="Interest">Interest</option>
                    <option value="Other-Income">Other-Income</option>
                    <option value="see-all">See all</option>
                  </select>

              </div>

              <div id="category-select" role="alert" class="category-validation category-validation-js"></div>
  
              <div class="timeline-grid">
                <div class="timeline-text">Timeline</div>
  
                <div class="timeline-inner-grid"> 
                  <div><button type="button" class="filter-button-timeline-custom filter-button-timeline-custom-js"  value="custom" aria-controls="date-range" aria-expanded="false">Custom</button></div>
                  
                  <fieldset id="date-range">
                    <legend class="sr-only">Date range</legend>
                    <div class="time-from" id="time-from"></div>
                    <div class="time-to" id="time-to"></div>
                  </fieldset>
  
                  
                  <div><button type="button" class="filter-button-timeline"  value="7">Last 7 days</button></div>
                  
                  <div><button type="button" class="filter-button-timeline"  value="30">Last 30 days</button></div>
                  
                  <div><button type="button" class="filter-button-timeline"  value="60">Last 60 days</button></div>
                  
                  <div><button type="button" class="filter-button-timeline" value="see-all">See all</button></div>
                </div>
              </div>
  
              <div class="amount-grid">
  
                <div class="income-range-text">Income range</div>
  
                <div class="amount-inner-grid">
                  <div><button type="button" class="filter-button-amount-custom filter-button-amount-custom-js" value="custom" aria-controls="amount-range" aria-expanded="false">Custom</button></div>

                  <fieldset id="amount-range">
                    <legend class="sr-only">Amount range</legend>
                    <div class="min-amount" id="min-amount"></div>
                    <div class="max-amount" id="max-amount"></div>
                  </fieldset>
                  
                  <div><button type="button" class="filter-button-amount filter-button-amount-first" value="5000">up to 5000Kč</button></div>
                  
                  <div><button type="button" class="filter-button-amount filter-button-amount-second" value="10000">up to 10000Kč</button></div>
                  
                  <div><button type="button" class="filter-button-amount filter-button-amount-third" value=" 20000">up to 20000kč</button></div>
  
                  <div><button type="button" class="filter-button-amount" value="see-all">See all</button></div>
                </div>
  
              </div>
              
              <div class="filter-submit-button-box"><button type="button" class="filter-submit-button filter-submit-button-js">Filter</button></div>
          </div>
  
  
        </div>
  
        <div class="bottom-part">
          <div class="income-grid">

            <div>
              <div class="income-inner-title">Income Overview</div>
              
            </div>
      
            <div class="income-info-grid js-income-info-grid">

            </div>
            <div role="status" class="income-validation"></div>
          </div>
        
          <div class="income-chart-grid">
            <div class="income-overview-text">Income Overview Chart</div>
            <div class="income-overview-chart-wrapper">
              <div  class="income-overview-chart-wrapper-inner">
                <canvas id="income-chart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer></footer>
    <script type="module" src="./script/income-page/see-all-income.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  </body>
</html>
