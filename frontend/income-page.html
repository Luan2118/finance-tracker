<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="./css-style/income-page/income.css">
    <link rel="stylesheet" href="./css-style/shared/general.css">
    <link rel="stylesheet" href="./css-style/shared/sharedHeader.css">
    <link rel="stylesheet" href="./css-style/shared/sidebar.css">
  </head>

  <body>
    <div class="header">
      <div id="menu-icon-box"><img class="menu-icon js-menu-icon" src="icons/menu-icon.png"></div>
      <div class="title"><a href="index.html">Finance Tracker</a></div>
    </div>


    <div class="layout">
      <div id="sidebar" class="sidebar">
        <div class="profile-link">
          <div class="profile-picture-wrapper"><img class="profile-picture" src="icons/profile-picture.jpg"></div>
          <div class="profile-name profile-name-js"></div>
        </div>

        <a href="index.html">
          <div class="side-bar-link">
            <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/dashboard-icon.png"></div>
            <div class="side-bar-text"><button class="dashboard-button">Dashboard</button></div>
          </div>
        </a>

        <a href="income-page.html">
        <div class="side-bar-link">
          <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-income-icon.png"></div>
          <div class="side-bar-text">
            <button class="income-button">Income</button></div>
        </div>
        </a>
        
        <a href="expense-page.html">
          <div class="side-bar-link">
            <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-expense-icon.png"></div>
            <div class="side-bar-text"><button class="expense-button">Expense</button></div>
          </div>
        </a>

        <div class="side-bar-link">
          <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/logout-icon.jpg"></div>
          <div class="side-bar-text logout-button-js"><button class="logout-button">Logout</button></div>
        </div>
      </div>

      <div class="main-income-grid">
        <div class="top-part">
          
          <div class="income-overview-grid">
            <div class="income-overview-text">Income Overview</div>
            <div>
              <button   class="add-income-button js-add-income-button">&#43; Add Income</button>
            </div>
          </div>
  
          <dialog id="add-income-dialog" >
              <form class="add-income-form" id="income-submit-form">
              <div class="add-income-header">
                <div class="add-income-header-title">Add Income</div>
                <button   class="add-income-popup-close-button js-add-income-popup-close" type="button">&times;</button>
              </div>
              <hr>
              
              <div class="input-grid">
                <div class="emoji-picker-grid">
  
                  <div class="emoji-picker-inner-grid">
                    <div><img class="emoji-picker js-emoji-picker" src="icons/emoji-picker.png">
                    </div>
    
                    <div class="js-emoji-picker-element"></div>
                    <div class="pick-icon"><p>Pick Icon</p></div>
                    <div><input maxlength="2" id="emoji-input"class=" emoji-picked js-emoji-picked"></div>
                  </div>
  
                  <div>
                   <label class="income-category">
                    Category:
                    <select  name="category">
                      <option value="" selected disabled>Select a category</option>
                      <option value="Salary">Salary</option>
                      <option value="Part-Time">Part-Time</option>
                      <option value="Overtime">Overtime</option>
                      <option value="Interest">Interest</option>
                      <option value="Other-Income">Other-Income</option>
                    </select>
                  </label>
                  </div>
                </div>
  
                <div class="category-input-alert js-category-input-alert"></div>
                
              <div class="add-income-inputs">
                <div>Income Source</div>
                <input id="income-source-input" class="add-income-input-element js-income-value" type="text" name="incomeValue">
                <div class="income-source-input-alert js-income-source-input-alert"></div>
              </div>
  
              <div class="add-income-inputs">
                <div>Amount</div>
                <input id="income-amount-input" class="add-income-input-element js-amount-value " type="number" min="1" required>
                <div class="income-amount-input-alert js-income-amount-input-alert"></div>
              </div>
  
              <div class="add-income-inputs">
                <div>Date</div>
                <input class="add-income-input-element js-date-value" type="date">
                <div class="income-date-input-alert js-income-date-input-alert"></div>
              </div>
  
              <div class="right-align">
                <button class="add-income-button-submit js-add-income-button-submit" type="button">Add Income</button>
              </div>
  
              </div>
  
              </form>
          </dialog>
  
            <div class="income-chart-grid">
              <div class="income-chart-wrap">
                <canvas id="income-chart"></canvas>
              </div>
              <input class="income-chart-filter-input" id="chart-filter" type="month">
              <button class="reset-filter-button" id="chart-reset-button">Reset</button>
            </div>
  
        </div>
  
        <div class="bottom-part">
          <div class="income-grid">
  
          <div class="income-sources-grid">
            <div class="income-title">Income Sources</div>
            <div><a href="see-all-income.html"><button class="see-all-button see-all-button-js">See All Income</button></a></div>
          </div>
    
          <div class="income-info-grid">
            
            <div class="each-income-grid js-each-income-grid" id="submit">
              </div>
            </div>
  
          </div>
  
        </div>
      </div>
    </div>



    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script type="module" src="script/income-page/income.js" ></script>
    <script type="module" src="script/chartJS/income-page/income-page-chart.js" ></script>

  </body>
</html>
