<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="./css-style/income-page/income.css">
    <link rel="stylesheet" href="./css-style/shared/general.css">
    <link rel="stylesheet" href="./css-style/shared/sharedHeader.css">
    <link rel="stylesheet" href="./css-style/shared/sidebar.css">
  </head>

  <body>

    <a class="skip-link" href="#main">Skip to content</a>

    <header class="header">
      <button type="button" id="menu-icon-box" class="menu-icon-btn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar"><img class="menu-icon js-menu-icon" src="icons/menu-icon.png" alt=""></button>
      <a class="title" href="index.html">Finance Tracker</a>
    </header>


    <div class="layout">
      
      <aside id="sidebar" class="sidebar" role="navigation">
        <div class="profile-link">
          <div class="profile-picture-wrapper"><img class="profile-picture" src="icons/profile-picture.jpg" alt="Profile photo"></div>
          <div class="profile-name profile-name-js"></div>
        </div>

        <nav aria-label="Primary">
          <ul>
            <li>
              <a href="index.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/dashboard-icon.png" alt=""></div>
                  <div class="side-bar-text dashboard-button">Dashboard</div>
                </div>
              </a>
            </li>
            
            <li>
              <a href="income-page.html" aria-current="page">
              <div class="side-bar-link">
                <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-income-icon.png" alt=""></div>
                <div class="side-bar-text income-button">Income</div>
              </div>
              </a>
            </li>
            
            <li>
              <a href="expense-page.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-expense-icon.png" alt=""></div>
                  <div class="side-bar-text expense-button">Expense</div>
                </div>
              </a>
            </li>
          </ul>
        </nav>

         <button type="button" class="side-bar-link logout-button logout-button-js">
          <span class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/logout-icon.jpg" alt=""></span>
          <span class="side-bar-text">Logout</span>
        </button>

      </aside>

      <main id="main" class="main-income-grid" tabindex="-1">
        <h1 class="page-title">Income page</h1>
        <section class="top-part">

          <header class="income-overview-grid">
            <h2 class="income-overview-text">Income Overview</h2>
            <button type="button"  class="add-income-button js-add-income-button" aria-controls="add-income-dialog" aria-haspopup="dialog">&#43; Add Income</button>
          </header>
  
          <dialog id="add-income-dialog" aria-labelledby="add-income-title" aria-modal="true">
            <form class="add-income-form" id="income-submit-form">
              <div class="add-income-header">
                <h2 id="add-income-title" class="add-income-header-title">Add Income</h2>
                <button class="add-income-popup-close-button js-add-income-popup-close" type="button" aria-label="Close">&times;</button>
              </div>
              <hr>
              
              <div class="input-grid">
                <div class="emoji-picker-grid">
  
                  <div class="emoji-picker-inner-grid">
                    <button type="button" class="emoji-picker-btn" aria-label="Emoji picker" aria-controls="emoji-picker-element" aria-expanded="false"><img class="emoji-picker js-emoji-picker" src="icons/emoji-picker.png" alt="" ></button>
    
                    <div id="emoji-picker-element" class="js-emoji-picker-element"></div>
                    <label for="emoji-input" class="pick-icon">Pick Icon</label>
                    <input maxlength="2" id="emoji-input" class=" emoji-picked js-emoji-picked" tabindex="-1" autocomplete="off">
                  </div>
  
                  <label class="income-category">
                    Category:
                    <select  class="category-input"  name="category" aria-describedby="category-error" >
                      <option value="" selected disabled>Select a category</option>
                      <option value="Salary">Salary</option>
                      <option value="Part-Time">Part-Time</option>
                      <option value="Overtime">Overtime</option>
                      <option value="Interest">Interest</option>
                      <option value="Other-Income">Other-Income</option>
                    </select>
                  </label>
                </div>
  
                <div id="category-error" class="category-input-alert js-category-input-alert"></div>
                
                <div class="add-income-inputs">
                  <label for="income-source-input">Income Source</label>
                  <input id="income-source-input" class="add-income-input-element income-input-js" type="text" name="incomeValue" aria-describedby="income-error"  >
                  <div id="income-error" class="income-source-input-alert js-income-source-input-alert"></div>
                </div>
    
                <div class="add-income-inputs">
                  <label for="income-amount-input">Amount</label>
                  <input id="income-amount-input" class="add-income-input-element amount-input-js " type="number" min="1"  aria-describedby="amount-error" name="amountValue">
                  <div id="amount-error" class="income-amount-input-alert js-income-amount-input-alert"></div>
                </div>
    
                <div class="add-income-inputs">
                  <label for="date-input">Date</label>
                  <input id="date-input" class="add-income-input-element date-input-js" type="date"  aria-describedby="date-error" name="dateValue">
                  <div id="date-error" class="income-date-input-alert js-income-date-input-alert"></div>
                </div>
    
                <div class="right-align">
                  <button class="add-income-button-submit js-add-income-button-submit right-align" type="submit">Add Income</button>
                </div>
  
              </div>
  
            </form>
          </dialog>
  
          <section class="income-chart-grid" aria-label="Income overview">
            <div class="income-chart-wrap">
              <div class="income-chart-wrap-inner">
                <canvas id="income-chart" role="img" aria-label="Income chart overview"></canvas>
              </div>

            </div>

            <label class="sr-only" for="chart-filter">Chart months filter</label>
            <input class="income-chart-filter-input" id="chart-filter" type="month">

            <button type="button" class="reset-filter-button" id="chart-reset-button">Reset</button>
          </section>
  
        </section>
  
        <section class="bottom-part">

          <header class="income-sources-grid">
            <h2 class="income-title">Income Sources</h2>
            <a href="see-all-income.html" class="see-all-button">See All Income</a>
          </header>
    

          <ol class="each-income-grid js-each-income-grid" id="submit"></ol>


        </section>

      </main>
    </div>


    <footer></footer>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <script type="module">
      import textFieldEdit from 'https://cdn.jsdelivr.net/npm/text-field-edit@^4/index.js';
      window.textFieldEdit = textFieldEdit;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script type="module" src="script/income-page/income.js" ></script>
    <script type="module" src="script/chartJS/income-page/income-page-chart.js" ></script>

  </body>
</html>
