<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>See all Expenses</title>
    <link rel="stylesheet" href="./css-style/shared/general.css">
    <link rel="stylesheet" href="./css-style/expense-page/see-all-expenses.css">
    <link rel="stylesheet" href="./css-style/shared/sharedHeader.css">
    <link rel="stylesheet" href="./css-style/shared/sidebar.css">
    
  </head>

  <body>

    <a class="skip-link"  href="#main">Skip to content</a>

    <header  class="header">
      <button type="button" id="menu-icon-box" class="menu-icon-btn" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar"><img class="menu-icon js-menu-icon" src="icons/menu-icon.png" alt=""></button>
      <a class="title" href="index.html">Finance Tracker</a>
    </header>


    <div class="layout">

      <aside id="sidebar" class="sidebar">
        <div class="profile-link">
          <div  class="profile-picture-wrapper"><img class="profile-picture" src="icons/profile-picture.jpg" alt="Profile photo"></div>
          <div class="profile-name profile-name-js"></div>
        </div>

        <nav aria-label="Primary">
          <ul>
            <li>
              <a href="index.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/dashboard-icon.png" alt=""></div>
                  <div class="side-bar-text dashboard-button">Dashboard</div>
                </div>
              </a>
            </li>
            
            <li>
              <a href="income-page.html">
              <div class="side-bar-link">
                <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-income-icon.png" alt=""></div>
                <div class="side-bar-text income-button">Income</div>
              </div>
              </a>
            </li>
            
            <li>
              <a href="expense-page.html">
                <div class="side-bar-link">
                  <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/sidebar-expense-icon.png" alt=""></div>
                  <div class="side-bar-text expense-button">Expense</div>
                </div>
              </a>
            </li>
          </ul>
        </nav>


        <button type="button" class="side-bar-link logout-button logout-button-js">
          <span class="sidebar-icon-wrapper"><img class="sidebar-icon" src="icons/logout-icon.jpg" alt=""></span>
          <span class="side-bar-text">Logout</span>
        </button>

      </aside>
    
      <main id="main" class="main-grid" tabindex="-1">
        <h1 class="see-all-title">
          See All Expenses
        </h1>
        
        <section class="top-part">
          <h2 class="filter-text">
            Filter:
          </h2>
          <div class="filter-grid">
              <section class="category-grid">

                <label for="category" class="label category-text">Category</label>
                  <select id="category" class="expense-category" name="category"  aria-describedby="category-error" aria-invalid="false">
                    <option value="" selected disabled>Select a category</option>
                      <option value="Food & Groceries">Food & Groceries</option>
                      <option value="Dining Out / Takeout">Dining Out / Takeout</option>
                      <option value="Shopping">Shopping</option>
                      <option value="Transportation">Transportation</option>
                      <option value="Health">Health</option>
                      <option value="Entertainment">Entertainment</option>
                      <option value="Travel">Travel</option>
                      <option value="Education">Education</option>
                      <option value="Housing">Housing</option>
                      <option value="Other-Expense">Other-Expense</option>
                      <option value="see-all">See all</option>
                  </select>
  
              </section>

              <div id="category-error"  class="category-validation category-validation-js"></div>
  
              <section class="timeline-grid">
                <h3 class="timeline-text">Timeline</h3>
  
                <div class="timeline-inner-grid"> 
                  <button type="button" class="filter-button-timeline-custom filter-button-timeline-custom-js"  value="custom" aria-controls="date-range" aria-expanded="false">Custom</button>
                  

                  <fieldset id="date-range">
                    <legend class="sr-only">Date range</legend>
                    <div class="time-from" id="time-from"></div>
                    <div class="time-to" id="time-to"></div>
                  </fieldset>
  
                  
                  <button type="button" class="filter-button-timeline"  value="7">Last 7 days</button>
                  
                  <button type="button" class="filter-button-timeline"  value="30">Last 30 days</button>
                  
                  <button type="button" class="filter-button-timeline"  value="60">Last 60 days</button>
                  
                  <button type="button" class="filter-button-timeline" value="see-all">See all</button>
                </div>
              </section>
  
              <section class="amount-grid">
  
                <h3 class="expense-range-text">Expense range</h3>
  
                <div class="amount-inner-grid">
                  <button type="button" class="filter-button-amount-custom filter-button-amount-custom-js" value="custom" aria-controls="amount-range" aria-expanded="false">Custom</button>

                  <fieldset id="amount-range">
                    <legend class="sr-only">Amount range</legend>
                    <div class="min-amount" id="min-amount"></div>
                    <div class="max-amount" id="max-amount"></div>
                  </fieldset>
                  
                  <button type="button" class="filter-button-amount" value="500">up to 500Kč</button>
                  
                  <button type="button" class="filter-button-amount" value="1000">up to 1000Kč</button>
                  
                  <button type="button" class="filter-button-amount" value="5000">up to 5000kč</button>
                  <button type="button" class="filter-button-amount" value="see-all">See all</button>
                </div>
  
              </section>
              
              <button type="button" class="filter-submit-button filter-submit-button-js">Filter</button>
          </div>
        </section>
  
        <section class="bottom-part">
            <section class="expense-grid">

              <h2 class="expense-inner-title">Expense Overview</h2>

              <ol class="expense-info-grid js-expense-info-grid"></ol>
              <div  class="expense-validation"></div>
            </section>
        
            <section class="expense-chart-grid">
              <h2 class="expense-overview-text">Expense Overview Chart</h2>
              <div class="expense-overview-chart-wrapper">
                <div class="expense-overview-chart-wrapper-inner">
                  <canvas role="img" aria-label="Expense overview chart for selected period" id="expense-chart"></canvas>  
                </div>
              </div>
            </section>
        </section>    
      </main>

    </div>

    
    <script type="module" src="./script/expense-page/see-all-expense.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  </body>
</html>
