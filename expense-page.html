<!DOCTYPE html>
<html>
  <head>
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="css-style/expense-page/expense.css">
    <link rel="stylesheet" href="css-style/shared/general.css">
    <link rel="stylesheet" href="css-style/shared/heather.css">
    <link rel="stylesheet" href="css-style/shared/sidebar.css">
  </head>

  <body>
    <div class="heather">
      <div class="title">Expense Tracker</div>
    </div>

    <div class="sidebar">
      <div class="profile-link">
        <div><img class="profile-picture" src="icons/profile-picture.jpg"></div>
        <div class="profile-name">Luan Le</div>
      </div>

      <a href="main-page.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/dashboard-icon.png"></div>
          <div class="side-bar-text">Dashboard</div>
        </div>
      </a>

      <a href="income-page.html">
      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/sidebar-income-icon.png"></div>
        <div class="side-bar-text">
          Income</div>
      </div>
      </a>
      
      <a href="expense-page.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/sidebar-expense-icon.png"></div>
          <div class="side-bar-text">Expense</div>
        </div>
      </a>

      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/logout-icon.jpg"></div>
        <div class="side-bar-text">Logout</div>
      </div>
    </div>

    <div class="main-expense-grid">
      <div class="horní-část">
  
        <div class="expense-overview-grid">
          <div class="expense-overview-text">Expense Overview</div>
          <div>
            <button class="add-expense-button">&#43; Add Expense</button>
          </div>
        </div>

        <div>
          <img class="expense-bar-chart-img" src="icons/expense-line-chart.png">
        </div>

      </div>

      <div class="dolní-část">
        <div class="expense-grid">

        <div class="expense-sources-grid">
          <div class="expense-title">All Expenses</div>
          <div><button class="see-all-button">Download <span class="see-all-arrow">&#8594;</span></button></div>
        </div>
  
        <div class="expense-info-grid">
          
          <div class="each-expense-grid">
            <div class="each-expense">
              <div class="expense-info-inner-grid">
              <div class="expense-img-grid"><img class="expense-img" src="icons/shopping-icon.png"></div>
              <div class="expense-info">
                <div>
                  <div>Shopping</div>
                  <div class="expense-date">9.5.2025</div>
                </div>
                
                <div class="expense-amount-minus">-5000Kč</div>
              </div>
              </div>
            </div>
          
            <div class="each-expense">
              <div class="expense-info-inner-grid">
                <div class="expense-img-grid"><img class="expense-img" src="icons/salary-icon.png"></div>
                <div class="expense-info">
                  <div>
                    <div>Food</div>
                    <div class="expense-date">10.5.2025</div>
                  </div>
                  
                  <div class="expense-amount-minus">-1000Kč</div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="each-expense-grid">
            <div>
              <div class="expense-info-inner-grid">
                <div class="expense-img-grid"><img class="expense-img" src="icons/utility-bills-icon.png"></div>
                <div class="expense-info">
                  <div>
                    <div>Utility Bills</div>
                    <div class="expense-date">6.5.2025</div>
                  </div>
                  
                  <div class="expense-amount-minus">-1500Kč</div>
                </div>
              </div>
            </div>

            <div>
              <div class="expense-info-inner-grid">
                <div class="expense-img-grid"><img class="expense-img" src="icons/utility-bills-icon.png"></div>
                <div class="expense-info">
                  <div>
                    <div>Utility Bills</div>
                    <div class="expense-date">6.5.2025</div>
                  </div>
                  
                  <div class="expense-amount-minus">-3000Kč</div>
                </div>
              </div>
            </div>
          </div>
        
        </div>

      </div>

    </div>
  </body>
</html>
