<!DOCTYPE html>
<html>
  <head>
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="css-style/expense-page/expense.css">
    <link rel="stylesheet" href="css-style/shared/general.css">
    <link rel="stylesheet" href="css-style/shared/header.css">
    <link rel="stylesheet" href="css-style/shared/sidebar.css">
  </head>

  <body>
    <div class="header">
      <div class="title"><a href="index.html">Expense Tracker</a></div>
    </div>

    <div class="sidebar">
      <div class="profile-link">
        <div><img class="profile-picture" src="icons/profile-picture.jpg"></div>
        <div class="profile-name">Luan Le</div>
      </div>

      <a href="index.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/dashboard-icon.png"></div>
          <div class="side-bar-text">Dashboard</div>
        </div>
      </a>

      <a href="income-page.html">
      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/sidebar-income-icon.png"></div>
        <div class="side-bar-text">
          Income</div>
      </div>
      </a>
      
      <a href="expense-page.html">
        <div class="side-bar-link">
          <div><img class="sidebar-icon" src="icons/sidebar-expense-icon.png"></div>
          <div class="side-bar-text">Expense</div>
        </div>
      </a>

      <div class="side-bar-link">
        <div><img class="sidebar-icon" src="icons/logout-icon.jpg"></div>
        <div class="side-bar-text">Logout</div>
      </div>
    </div>

    <div class="main-expense-grid">
      <div class="top-part">
  
        <div class="expense-overview-grid">
          <div class="expense-overview-text">Expense Overview</div>
          <div>
            <button class="add-expense-button js-add-expense-button">&#43; Add Expense</button>
          </div>
        </div>

        <dialog id="add-expense-dialog" class="js-add-expense-dialog" >
            <form class="add-expense-form js-add-expense-form">
            <div class="add-expense-header">
              <div class="add-expense-header-title">Add Expense</div>
              <button   class="add-expense-popup-close-button js-add-expense-popup-close" type="button">&times;</button>
              
            </div>
            <hr>
            
            <div class="input-grid">
              <div class="emoji-picker-grid">

                <div><img class="emoji-picker js-emoji-picker" src="icons/emoji-picker.png">
                </div>

                <div class="js-emoji-picker-element"></div>
                <div class="pick-icon"><p>Pick Icon</p></div>
                <div><input maxlength="2" id="emoji-input"class=" emoji-picked js-emoji-picked"></div>
              </div>

              <div class="emoji-input-alert js-emoji-input-alert"></div>
            
            <div class="add-expense-inputs">
              <div>Expense Source</div>
              <input id="expense-source-input" class="add-expense-input-element js-expense-value" type="text" name="incomeValue">

            </div>

            <div class="add-expense-inputs">
              <div>Amount</div>
              <input id="expense-amount-input" class="add-expense-input-element js-amount-value " type="number" min="0" step="1"  oninput="this.value = this.value.replace(/[^0-9]/g,'')">
              <div class="expense-amount-input-alert js-expense-amount-input-alert"></div>
            </div>

            <div class="add-expense-inputs">
              <div>Date</div>
              <input class="add-expense-input-element js-date-value" type="date">
              <div class="expense-date-input-alert js-expense-date-input-alert"></div>
            </div>

            <div class="right-align">
              <button class="add-expense-button-submit js-add-expense-button-submit" type="button">Add Expense</button>
            </div>

            </div>

            </form>
        </dialog>

        <div class="expense-chart-grid">
          <canvas id="expense-chart"></canvas>
          <input class="expense-chart-filter-input" id="chart-filter" type="month">
          <button class="reset-filter-button" id="chart-reset-button">Reset</button>
        </div>

      </div>

      <div class="bottom-part">
        <div class="expense-grid">

        <div class="expense-sources-grid">
          <div class="expense-title">All Expenses</div>
          <div><button class="see-all-button">Download <span class="see-all-arrow">&#8594;</span></button></div>
        </div>
  
        <div class="expense-info-grid">
          <div class="each-expense-grid js-each-expense-grid">
        </div>

      </div>

    </div>

    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script type="module" src="script/expense.js"></script>
    <script type="module" src="script/chartJS/expenseChartJS.js"></script>
  </body>
</html>
